<svg viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background, no fill -->
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <filter id="logoShadow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1" />
    </filter>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(10, 15)">
    <!-- Left bracket -->
    <path d="M 10 5 L 5 5 L 5 55 L 10 55" stroke="url(#logoGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Right bracket -->
    <path d="M 50 5 L 55 5 L 55 55 L 50 55" stroke="url(#logoGrad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Weaving lines -->
    <path d="M 20 15 Q 32.5 30 20 45" stroke="#f35b04" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M 40 15 Q 27.5 30 40 45" stroke="#06b6d4" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Text -->
  <text x="100" y="55" font-size="48" font-weight="bold" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <tspan fill="#3b82f6">Code</tspan><tspan fill="#f35b04">Weave</tspan>
  </text>
</svg>